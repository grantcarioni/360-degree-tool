name: CI/CD — Build & Deploy to Azure (NI 360 Feedback)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'
  # [ACTION REQUIRED] Replace with your actual Azure Web App name
  AZURE_WEBAPP_NAME: ni-360-feedback-app 
  AZURE_RESOURCE_GROUP: incident-reporting-rg # Reusing your resource group
  AZURE_LOCATION: eastus2

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        run: |
          cd v2
          npm install

      - name: Build application
        run: |
          cd v2
          npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-package
          # Copy the build output (dist) and the server files
          cp -r v2/dist deploy-package/
          cp -r v2/server deploy-package/
          cp v2/package.json deploy-package/
          # Install production dependencies for the server
          cd deploy-package
          npm install --omit=dev

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: deploy-package/

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: deploy-package

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy-package
          # Start the reconstructed Express server
          startup-command: 'node server/index.ts'
